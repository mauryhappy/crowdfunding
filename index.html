<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso — Anatomia del Lancio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1612; --paper: #f5f0e8; --rust: #b5451b; --mist: #e8e2d5; --slate: #3d4a5c; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--paper); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .box { max-width: 400px; width: 100%; padding: 0 24px; }
  .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--rust); margin-bottom: 24px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 36px; line-height: 1.1; margin-bottom: 32px; }
  h1 em { font-style: italic; color: var(--rust); }
  input[type="password"] {
    width: 100%; padding: 16px; border: 1px solid var(--mist);
    background: transparent; font-family: 'DM Mono', monospace;
    font-size: 14px; color: var(--ink); outline: none;
    margin-bottom: 12px; transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: var(--rust); }
  button {
    width: 100%; padding: 16px; background: var(--ink); color: var(--paper);
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; border: none; cursor: pointer; transition: background 0.3s;
  }
  button:hover { background: var(--rust); }
  .error { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--rust); margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="box">
  <div class="label">Accesso riservato</div>
  <h1>Anatomia<br>del <em>Lancio</em></h1>
  <input type="password" id="pwd" placeholder="Inserisci la password…" onkeydown="if(event.key==='Enter') check()">
  <button onclick="check()">→ Entra</button>
  <div class="error" id="err">Password non corretta.</div>
</div>
<script>
  // Controlla se già autenticato
  if (sessionStorage.getItem('auth') === 'ok') location.href = 'test.html';

  function check() {
    // ← CAMBIA QUESTA PASSWORD
    const PASSWORD = 'ilmiolancio2025';
    if (document.getElementById('pwd').value === PASSWORD) {
      sessionStorage.setItem('auth', 'ok');
      location.href = 'test.html';
    } else {
      document.getElementById('err').style.display = 'block';
    }
  }
</script>
</body>
</html>
